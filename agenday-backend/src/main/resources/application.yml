spring:
  application:
    name: agenday-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenday}
    username: ${SPRING_DATASOURCE_USERNAME:agenday}
    password: ${SPRING_DATASOURCE_PASSWORD:agenday_password}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dmsakOFHNAlkmdsaKNDaKLNNDASKLNDmdjdsalNDSAlknmdslNDLSADNlndksalKNDKLA}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true