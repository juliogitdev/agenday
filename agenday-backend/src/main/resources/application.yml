spring:
  application:
    name: agenday-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agenday}
    username: ${DATABASE_USERNAME:agenday}
    password: ${DATABASE_PASSWORD:agenday_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:senhasecreta}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000