# Banco H2 em memória para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria as tabelas automaticamente a partir das @Entity
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Desativa o Flyway nos testes (ele é só para o banco real)
spring.flyway.enabled=false

# Configs JWT
jwt.secret=test-super-secret-key-with-more-than-32-characters-123456
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000


