name: Backend CI

on:
  push:
    branches: [ main, develop ]
     paths:
      - 'agenday-backend/**'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    branches: [ main, develop ]
    paths:
      - 'agenday-backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test-and-build:
    name: Run Unit Tests and Build
    runs-on: ubuntu-latest

    services:
      # Configuração do PostgreSQL para testes de integração
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agenday_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven and Run Tests
        run: mvn clean verify
        working-directory: agenday-backend
