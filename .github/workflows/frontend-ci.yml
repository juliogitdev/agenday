name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agenday-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'agenday-frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: agenday-frontend

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: agenday-frontend/node_modules
          key: node-modules-${{ hashFiles('agenday-frontend/package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agenday-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # O build e deploy são feitos pelo Cloudflare Pages automaticamente.